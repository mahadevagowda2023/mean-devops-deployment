name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        run: |
          docker build -t mahadevagowda2023/mean-backend ./backend
          docker push mahadevagowda2023/mean-backend

      - name: Build and Push Frontend
        run: |
          docker build -t mahadevagowda2023/mean-frontend ./frontend
          docker push mahadevagowda2023/mean-frontend
